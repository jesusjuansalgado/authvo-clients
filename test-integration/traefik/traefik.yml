# Traefik static configuration.
# Fronts the IAM and the PRM sidecar at ONE origin (iam.local.io) so the
# client's domain-proxy check (sidecar & issuer share origin) is meaningful.
entryPoints:
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
  file:
    directory: /etc/traefik/dynamic
    watch: true

# Self-signed certs for *.local.io are generated by setup.sh into ./certs and
# referenced from the dynamic config (dynamic.yml, written by setup.sh).
log:
  level: INFO

api:
  dashboard: false
