# AuthVO local integration harness
# -----------------------------------------------------------------------------
# Brings up, behind a single TLS origin (iam.local.io):
#   - INDIGO IAM  (+ MariaDB, Redis, trustanchors)   -> the authorization server
#   - prm-sidecar (nginx serving one RFC 9728 JSON)   -> the "sidecar"
# and, on a second origin (src.local.io):
#   - resource    (the protected REST interface)      -> the demo closer
#
# Run ./setup.sh first: it generates the *.local.io certs and the Traefik
# dynamic config, reminds you about /etc/hosts, then `docker compose up`.
#
# NOTE on INDIGO IAM: image tags, env var names and the bootstrap mechanism
# move between releases. The `iam` service below mirrors the upstream
# indigo-iam/iam compose shape; pin a known-good tag and adjust env to your
# version. The harness around it (sidecar, proxy, resource, demo) is stable.

services:
  proxy:
    image: traefik:v3.1
    command: --configFile=/etc/traefik/traefik.yml
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro   # written by setup.sh
      - ./certs:/certs:ro
    networks:
      default:
        aliases:
          - iam.local.io
          - src.local.io

  # --- IAM origin: authorization server -------------------------------------
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: pwd
      MYSQL_USER: iam
      MYSQL_PASSWORD: pwd
      MYSQL_DATABASE: iam
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  trustanchors:
    image: indigoiam/trustanchors:latest
    command: /bin/true
    volumes:
      - trustanchors:/etc/grid-security/certificates

  iam:
    image: indigoiam/iam-login-service:v1.10.0   # pin to a release you trust
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./iam/iam.env
    volumes:
      - trustanchors:/etc/grid-security/certificates:ro
      # JWT signing key set (generated by setup; kid must match IAM_JWK_DEFAULT_KEY_ID).
      - ./iam/keys/keystore.jwks:/keystore.jwks:ro
    labels:
      - "traefik.enable=true"
      # IAM gets the whole iam.local.io host EXCEPT the PRM path (see sidecar).
      - "traefik.http.routers.iam.rule=Host(`iam.local.io`)"
      - "traefik.http.routers.iam.entrypoints=websecure"
      - "traefik.http.routers.iam.tls=true"
      - "traefik.http.routers.iam.priority=1"
      - "traefik.http.services.iam.loadbalancer.server.port=8080"

  # --- The "sidecar": one static RFC 9728 document, co-located at the IAM ----
  prm-sidecar:
    image: nginx:alpine
    volumes:
      - ./sidecar/prm.json:/usr/share/nginx/html/.well-known/oauth-protected-resource:ro
      - ./sidecar/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      # Higher priority than the IAM router so this exact path wins on the
      # shared iam.local.io origin.
      - "traefik.http.routers.prm.rule=Host(`iam.local.io`) && Path(`/.well-known/oauth-protected-resource`)"
      - "traefik.http.routers.prm.entrypoints=websecure"
      - "traefik.http.routers.prm.tls=true"
      - "traefik.http.routers.prm.priority=100"
      - "traefik.http.services.prm.loadbalancer.server.port=80"

  # --- Resource origin: the protected REST interface ------------------------
  resource:
    build: ./fake-rs
    environment:
      RS_RESOURCE_ID: "https://src.local.io"
      RS_ISSUER: "https://iam.local.io/"
      RS_PRM_URL: "https://iam.local.io/.well-known/oauth-protected-resource"
      RS_REQUIRED_SCOPE: "vo.read"
      RS_CA_BUNDLE: "/certs/local-ca.pem"   # trust the harness origin for JWKS
      # PyJWKClient (pinned PyJWT 2.7.0) fetches the JWKS via urllib, which
      # ignores RS_CA_BUNDLE; point urllib's default TLS context at our CA too.
      SSL_CERT_FILE: "/certs/local-ca.pem"
      # Read the payload from the mounted directory below. The app re-opens this
      # file on every request, so edits to the art show up live.
      RS_PAYLOAD_FILE: "/payload/protected_resource.txt"
    volumes:
      - ./certs/local-ca.pem:/certs/local-ca.pem:ro
      # Mount the WHOLE fake-rs dir (not the single file) at /payload. A directory
      # bind-mount survives editors that replace the file on save (atomic write),
      # so changing protected_resource.txt is picked up with no restart/rebuild.
      - ./fake-rs:/payload:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rs.rule=Host(`src.local.io`)"
      - "traefik.http.routers.rs.entrypoints=websecure"
      - "traefik.http.routers.rs.tls=true"
      - "traefik.http.services.rs.loadbalancer.server.port=8000"

volumes:
  trustanchors:

networks:
  default:
